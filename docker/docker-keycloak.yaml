services:
  postgres:
    image: postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${DATABASE_PORT}:5432"
    environment:
      POSTGRES_DB: ${DATAB_BASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    networks:
      - keycloak_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USERNAME} -d ${DATAB_BASE_NAME}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"
        reservations:
          memory: 512M

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.5
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DATAB_BASE_NAME}
      KC_DB_USERNAME: ${DATABASE_USERNAME}
      KC_DB_PASSWORD: ${DATABASE_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
      # This is needed for Keycloak to start in dev mode with an http listener
      KC_HTTP_ENABLED: true
    ports:
      - "8081:8080"
    networks:
      - keycloak_network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G # Hard limit of 2 Gigabytes
          cpus: "4.0" # Hard limit of 4 CPU cores
        reservations:
          memory: 512M # Guaranteed minimum 512MB RAM

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - keycloak_network
    healthcheck:
      #--no-auth-warning suppresses logs complaining about passwords in the command line
      test:
        ["CMD-SHELL", "redis-cli --no-auth-warning -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  minio:
    image: minio/minio:latest
    # Starts the server and explicitly sets the web dashboard to port 9001
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000" # The S3 API port (This is what your Go code talks to)
      - "9001:9001" # The Web Console port (This is what your browser talks to)
    networks:
      - keycloak_network
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  imgproxy:
    image: darthsim/imgproxy:latest
    environment:
      # Tell Imgproxy it is allowed to fetch files from S3/MinIO
      - IMGPROXY_USE_S3=true
      # Point it to your internal MinIO container (using the Docker network)
      - IMGPROXY_S3_ENDPOINT=http://minio:9000
      # Use the same credentials as your MinIO root user
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      # MinIO defaults to us-east-1 unless configured otherwise
      - AWS_REGION=us-east-1
      # Useful for development: Disable URL signature checking (TURN ON IN PRODUCTION)
      - IMGPROXY_DEVELOPMENT_ERRORS_MODE=true
    networks:
      - keycloak_network
    depends_on:
      - minio
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  nginx:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      # Mounts the config file from your host machine to the container
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Volume to store the cached images permanently
      - nginx_image_cache:/var/cache/nginx
    networks:
      - keycloak_network
    depends_on:
      - imgproxy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

networks:
  keycloak_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  nginx_image_cache:
    driver: local
